# =============================================================================
# PRODUCTION Docker Compose - Single Container (Frontend + Backend combined)
# =============================================================================
# App: http://localhost:8080 (or custom PORT)
# API: http://localhost:8080/api
# Docs: http://localhost:8080/docs
# =============================================================================
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Custom port:
#   PORT=3000 docker compose up -d
#
# =============================================================================

services:
  ixia-inventory-explorer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ixia-inventory-explorer:latest
    container_name: ixia-inventory-explorer
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ixia-data:/app/data
    environment:
      - PORT=${PORT:-8080}
      - DEBUG=False
      - DATABASE_PATH=/app/data/inventory.db
      - CORS_ORIGINS=*
      - HOST=0.0.0.0
      - MINIMAL_MODE=false
      - CLEAN_DB_ON_START=${CLEAN_DB_ON_START:-false}
      # Mac/Windows: host.docker.internal | Linux: host IP or service name
      - ADK_URL=${ADK_URL:-http://host.docker.internal:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ixia-data:
